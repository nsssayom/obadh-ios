name: Obadh
options:
  bundleIdPrefix: com.nsssayom
  deploymentTarget:
    iOS: "18.0"
# Debug-Legacy is a debug build whose container app opts out of Liquid Glass
# (UIDesignRequiresCompatibility, see ObadhApp/Info-Legacy.plist) so we can test how
# iOS presents the keyboard when the HOST app is treated as pre-iOS-26 — the Messenger
# geometry/height case — reproducibly on the iOS 26 simulator and the iOS 27 device.
configs:
  Debug: debug
  Debug-Legacy: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    MARKETING_VERSION: "0.1.0"
    # CURRENT_PROJECT_VERSION comes from Config/BuildInfo.xcconfig (git-stamped by
    # scripts/stamp-build.sh), with a fallback in Signing.xcconfig — NOT set here,
    # or a project-level value would override the xcconfig.
    GENERATE_INFOPLIST_FILE: NO
targets:
  Obadh:
    type: application
    platform: iOS
    sources:
      - path: ObadhApp/Sources
      - path: ObadhApp/Resources/Assets.xcassets
      # Empty on purpose: it exists so the app has an entry in Settings at all, which
      # is what openSettingsURLString needs in order to land anywhere but the root.
      - path: ObadhApp/Resources/Settings.bundle
        buildPhase: resources
      - path: Shared/Sources/Settings/KeyboardPreferences.swift
      - path: Shared/Sources/Settings/KeyboardInstallState.swift
      - path: Shared/Sources/Settings/LearnedWordStore.swift
      - path: Shared/Sources/Settings/AppBuildInfo.swift
      - path: Shared/Sources/Engine/PersonalAutosuggestStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nsssayom.obadh
        INFOPLIST_FILE: ObadhApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/Obadh.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug-Legacy:
          INFOPLIST_FILE: ObadhApp/Info-Legacy.plist
    configFiles:
      Debug: Config/Signing.xcconfig
      Debug-Legacy: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    dependencies:
      - target: ObadhKeyboard
        embed: true
  ObadhKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: ObadhKeyboard/Sources
      - path: Shared/Sources/Design
      - path: Shared/Sources/Engine
      - path: Shared/Sources/Keyboard
      - path: Shared/Sources/Settings/KeyboardPreferences.swift
      - path: Shared/Sources/Settings/LearnedWordStore.swift
      - path: Shared/Sources/Settings/AppBuildInfo.swift
      - path: Resources/ObadhModels
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nsssayom.obadh.keyboard
        INFOPLIST_FILE: ObadhKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/ObadhKeyboard.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
    configFiles:
      Debug: Config/Signing.xcconfig
      Debug-Legacy: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    dependencies:
      - framework: Frameworks/ObadhBridge.xcframework
        embed: false
  ObadhEngineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/ObadhEngineTests
      # The bridge client + its protocol, compiled against the real cabi so the
      # Swift↔C boundary is what's under test.
      - path: Shared/Sources/Engine/ObadhBridgeClient.swift
      - path: Shared/Sources/Engine/BanglaTypingEngine.swift
      - path: Shared/Sources/Engine/AutoInsertGate.swift
      # The shipped artifacts, so the tests run against real data (folder ref so
      # the ObadhModels/... subpaths resolve like they do in the keyboard).
      - path: Resources/ObadhModels
        buildPhase: resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nsssayom.obadh.enginetests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - framework: Frameworks/ObadhBridge.xcframework
        embed: false
schemes:
  # Runs the Debug-Legacy config: same debug tooling, but the container app opts out
  # of Liquid Glass so the keyboard can be observed in the legacy host presentation.
  Obadh-Legacy:
    build:
      targets:
        Obadh: all
    run:
      config: Debug-Legacy
      executable: Obadh
  Obadh:
    build:
      targets:
        Obadh: all
    run:
      config: Debug
      executable: Obadh
    test:
      config: Debug
      targets:
        - ObadhEngineTests
    profile:
      config: Release
      executable: Obadh
    analyze:
      config: Debug
    archive:
      config: Release
